<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

<h2 class="mb-4">Admin Dashboard</h2>

<a href="/" class="btn btn-secondary mb-3">Back to Store</a>

<a href="/admin/orders" class="btn btn-dark mb-3">View Orders</a>

<hr>

<h4>Add New Product</h4>

<form action="/add-product" method="POST" enctype="multipart/form-data">

<div class="row">

<div class="col-md-3">
<input type="text" name="name" class="form-control" placeholder="Product Name" required>
</div>

<div class="col-md-2">
<input type="number" name="price" class="form-control" placeholder="Price" required>
</div>

<div class="col-md-3">
<input type="file" name="image" class="form-control" required>
</div>

<div class="col-md-2">

<select name="category" class="form-control">

<option value="Electronics">Electronics</option>
<option value="Accessories">Accessories</option>
<option value="Gadgets">Gadgets</option>
<option value="Home Appliances">Home Appliances</option>

</select>

</div>

<div class="col-md-2">

<button type="submit" class="btn btn-success">
Add Product
</button>

</div>

</div>

</form>

<hr>

<h4 class="mt-4">Products</h4>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Category</th>
<th>Image</th>
<th>Actions</th>
</tr>

</thead>

<tbody>

{% for product in products %}

<tr>

<td>{{ product[0] }}</td>
<td>{{ product[1] }}</td>
<td>₹{{ product[2] }}</td>
<td>{{ product[4] }}</td>

<td>
<img src="/static/images/{{ product[3] }}" width="60">
</td>

<td>

<a href="/delete-product/{{ product[0] }}"
class="btn btn-danger btn-sm">
Delete
</a>

<a href="/edit-product/{{ product[0] }}"
class="btn btn-primary btn-sm">
Edit
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
